<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Librairie - Gestion des Emprunts</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 1.5em;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 1em;
      transition: border-color 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #764ba2;
    }

    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 5px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .section {
      background: white;
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .section h3 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 1.3em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table th, table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    table th {
      background: #667eea;
      color: white;
    }

    table tr:hover {
      background: #f5f5f5;
    }

    .btn-small {
      width: auto;
      padding: 8px 15px;
      font-size: 0.9em;
      margin: 5px;
    }

    .btn-delete {
      background: #dc3545;
    }

    .btn-delete:hover {
      background: #c82333;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📚 Librairie - Gestion des Emprunts</h1>

  <div class="cards">
    <!-- Add Client Card -->
    <div class="card">
      <h2>👤 Ajouter un Client</h2>
      <form id="formClient">
        <div class="form-group">
          <label for="nomClient">Nom</label>
          <input type="text" id="nomClient" name="nom" required>
        </div>
        <div class="form-group">
          <label for="emailClient">Email</label>
          <input type="email" id="emailClient" name="email" required>
        </div>
        <div class="form-group">
          <label for="telClient">Téléphone</label>
          <input type="tel" id="telClient" name="tel">
        </div>
        <button type="submit">Ajouter Client</button>
        <div id="messageClient" class="message"></div>
      </form>
    </div>

    <!-- Add Book Card -->
    <div class="card">
      <h2>📖 Ajouter un Livre</h2>
      <form id="formLivre">
        <div class="form-group">
          <label for="titreLivre">Titre</label>
          <input type="text" id="titreLivre" name="titre" required>
        </div>
        <div class="form-group">
          <label for="auteurLivre">Auteur</label>
          <input type="text" id="auteurLivre" name="auteur" required>
        </div>
        <div class="form-group">
          <label for="stockLivre">Stock</label>
          <input type="number" id="stockLivre" name="stock" value="1" required>
        </div>
        <button type="submit">Ajouter Livre</button>
        <div id="messageLivre" class="message"></div>
      </form>
    </div>

    <!-- Add Borrow Card -->
    <div class="card">
      <h2>📕 Ajouter un Emprunt</h2>
      <form id="formEmprunt">
        <div class="form-group">
          <label for="idClientEmprunt">ID Client</label>
          <input type="text" id="idClientEmprunt" name="idClient" required placeholder="ex: 5f3e...">
        </div>
        <div class="form-group">
          <label for="idLivreEmprunt">ID Livre</label>
          <input type="text" id="idLivreEmprunt" name="idLivre" required placeholder="ex: 5f3e...">
        </div>
        <button type="submit">Ajouter Emprunt</button>
        <div id="messageEmprunt" class="message"></div>
      </form>
    </div>
  </div>

  <!-- View Clients -->
  <div class="section">
    <h3>📋 Tous les Clients</h3>
    <button onclick="loadClients()">🔄 Rafraîchir</button>
    <table id="tableClients">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nom</th>
          <th>Email</th>
          <th>Téléphone</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="4" style="text-align: center;">Chargement...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- View Books -->
  <div class="section">
    <h3>📚 Tous les Livres</h3>
    <button onclick="loadLivres()">🔄 Rafraîchir</button>
    <table id="tableLivres">
      <thead>
        <tr>
          <th>ID</th>
          <th>Titre</th>
          <th>Auteur</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="4" style="text-align: center;">Chargement...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- View Borrows -->
  <div class="section">
    <h3>📖 Tous les Emprunts</h3>
    <button onclick="loadEmprunts()">🔄 Rafraîchir</button>
    <table id="tableEmprunts">
      <thead>
        <tr>
          <th>ID</th>
          <th>ID Client</th>
          <th>ID Livre</th>
          <th>Date Emprunt</th>
          <th>Retourné</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="5" style="text-align: center;">Chargement...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const API = 'http://localhost:3000';

// Add Client
document.getElementById('formClient').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = {
    nom: document.getElementById('nomClient').value,
    email: document.getElementById('emailClient').value,
    tel: document.getElementById('telClient').value
  };

  try {
    const response = await fetch(`${API}/api/v1/client`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    const msg = document.getElementById('messageClient');

    if (response.ok) {
      msg.textContent = `✅ Client ajouté avec succès! ID: ${result._id}`;
      msg.className = 'message success';
      document.getElementById('formClient').reset();
      setTimeout(() => loadClients(), 1000);
    } else {
      msg.textContent = `❌ Erreur: ${result.message}`;
      msg.className = 'message error';
    }
  } catch (err) {
    document.getElementById('messageClient').textContent = `❌ Erreur: ${err.message}`;
    document.getElementById('messageClient').className = 'message error';
  }
});

// Add Book
document.getElementById('formLivre').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = {
    titre: document.getElementById('titreLivre').value,
    auteur: document.getElementById('auteurLivre').value,
    stock: parseInt(document.getElementById('stockLivre').value)
  };

  try {
    const response = await fetch(`${API}/api/v1/livre`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    const msg = document.getElementById('messageLivre');

    if (response.ok) {
      msg.textContent = `✅ Livre ajouté avec succès! ID: ${result._id}`;
      msg.className = 'message success';
      document.getElementById('formLivre').reset();
      setTimeout(() => loadLivres(), 1000);
    } else {
      msg.textContent = `❌ Erreur: ${result.message}`;
      msg.className = 'message error';
    }
  } catch (err) {
    document.getElementById('messageLivre').textContent = `❌ Erreur: ${err.message}`;
    document.getElementById('messageLivre').className = 'message error';
  }
});

// Add Borrow
document.getElementById('formEmprunt').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = {
    idClient: document.getElementById('idClientEmprunt').value,
    idLivre: document.getElementById('idLivreEmprunt').value
  };

  try {
    const response = await fetch(`${API}/api/v1/emprunt`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    const msg = document.getElementById('messageEmprunt');

    if (response.ok) {
      msg.textContent = `✅ Emprunt ajouté avec succès! ID: ${result._id}`;
      msg.className = 'message success';
      document.getElementById('formEmprunt').reset();
      setTimeout(() => loadEmprunts(), 1000);
    } else {
      msg.textContent = `❌ Erreur: ${result.message}`;
      msg.className = 'message error';
    }
  } catch (err) {
    document.getElementById('messageEmprunt').textContent = `❌ Erreur: ${err.message}`;
    document.getElementById('messageEmprunt').className = 'message error';
  }
});

// Load Clients
async function loadClients() {
  try {
    const response = await fetch(`${API}/api/v1/client`);
    const clients = await response.json();
    const tbody = document.querySelector('#tableClients tbody');
    
    if (clients.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Aucun client</td></tr>';
      return;
    }

    tbody.innerHTML = clients.map(c => `
      <tr>
        <td>${c._id}</td>
        <td>${c.nom}</td>
        <td>${c.email}</td>
        <td>${c.tel || '-'}</td>
      </tr>
    `).join('');
  } catch (err) {
    console.error(err);
  }
}

// Load Books
async function loadLivres() {
  try {
    const response = await fetch(`${API}/api/v1/livre`);
    const livres = await response.json();
    const tbody = document.querySelector('#tableLivres tbody');
    
    if (livres.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Aucun livre</td></tr>';
      return;
    }

    tbody.innerHTML = livres.map(l => `
      <tr>
        <td>${l._id}</td>
        <td>${l.titre}</td>
        <td>${l.auteur}</td>
        <td>${l.stock}</td>
      </tr>
    `).join('');
  } catch (err) {
    console.error(err);
  }
}

// Load Borrows
async function loadEmprunts() {
  try {
    const response = await fetch(`${API}/api/v1/emprunt`);
    const emprunts = await response.json();
    const tbody = document.querySelector('#tableEmprunts tbody');
    
    if (!emprunts || emprunts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Aucun emprunt</td></tr>';
      return;
    }

    tbody.innerHTML = emprunts.map(e => `
      <tr>
        <td>${e._id}</td>
        <td>${e.idClient}</td>
        <td>${e.idLivre}</td>
        <td>${new Date(e.dateEmprunt).toLocaleDateString('fr-FR')}</td>
        <td>${e.retourne ? '✅ Oui' : '❌ Non'}</td>
      </tr>
    `).join('');
  } catch (err) {
    console.error(err);
  }
}

// Load all on page load
window.addEventListener('load', () => {
  loadClients();
  loadLivres();
  loadEmprunts();
});
</script>

</body>
</html>
